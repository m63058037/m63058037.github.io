<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>快乐论坛 - 聊天</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    
    .chat-room-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
    }
    
    .chat-room-header {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: var(--canvas-night-soft);
      border-bottom: 1px solid var(--hairline-on-dark);
      flex-shrink: 0;
    }
    
    .back-btn {
      background: none;
      border: none;
      color: var(--on-primary);
      font-size: 24px;
      cursor: pointer;
      padding: 8px;
      margin-right: 12px;
    }
    
    .chat-room-title {
      display: flex;
      align-items: center;
      flex: 1;
    }
    
    .chat-room-title img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      margin-right: 12px;
    }
    
    .chat-room-title span {
      font-size: 16px;
      font-weight: 600;
      color: var(--on-primary);
    }
    
    .chat-messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
    }
    
    .message {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 16px;
      margin-bottom: 12px;
      word-wrap: break-word;
      font-size: 15px;
      line-height: 1.5;
    }
    
    .message.sent {
      align-self: flex-end;
      background: var(--on-primary);
      color: var(--canvas-night);
      border-bottom-right-radius: 4px;
    }
    
    .message.received {
      align-self: flex-start;
      background: var(--canvas-night-soft);
      color: var(--on-primary);
      border-bottom-left-radius: 4px;
    }
    
    .message-time {
      font-size: 12px;
      opacity: 0.6;
      margin-top: 4px;
      text-align: right;
    }
    
    .chat-input-area {
      display: flex;
      align-items: center;
      padding: 12px;
      background: var(--canvas-night-soft);
      border-top: 1px solid var(--hairline-on-dark);
      flex-shrink: 0;
      gap: 12px;
    }
    
    .chat-input-area input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--hairline-on-dark);
      border-radius: 24px;
      background: var(--canvas-night);
      color: var(--on-primary);
      font-size: 15px;
      outline: none;
    }
    
    .chat-input-area input::placeholder {
      color: var(--ink-mute);
    }
    
    .chat-input-area button {
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 15px;
      font-weight: 600;
    }
    
    @media (max-width: 480px) {
      .chat-room-header {
        padding: 10px 12px;
      }
      
      .chat-room-title img {
        width: 36px;
        height: 36px;
      }
      
      .chat-messages-area {
        padding: 12px;
      }
      
      .message {
        max-width: 85%;
        padding: 10px 14px;
        font-size: 14px;
      }
      
      .chat-input-area {
        padding: 10px;
        gap: 8px;
      }
      
      .chat-input-area input {
        padding: 10px 14px;
      }
      
      .chat-input-area button {
        padding: 10px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="chat-room-container">
    <div class="chat-room-header">
      <button class="back-btn" id="back-btn">←</button>
      <div class="chat-room-title" id="chat-room-title">
        <img src="" alt="" id="friend-avatar">
        <span id="friend-name">好友名称</span>
      </div>
    </div>
    
    <div class="chat-messages-area" id="chat-messages"></div>
    
    <div class="chat-input-area">
      <input type="text" id="chat-input" placeholder="输入消息..." autocomplete="off">
      <button class="btn btn-primary" id="send-btn">发送</button>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    let friendUid = null;
    let friendName = null;
    let friendAvatar = null;
    
    document.addEventListener('DOMContentLoaded', async () => {
      const user = await getCurrentUser();
      
      if (!user) {
        window.location.href = 'index.html';
        return;
      }
      
      const params = new URLSearchParams(window.location.search);
      friendUid = params.get('uid');
      
      if (!friendUid) {
        window.location.href = 'chat.html';
        return;
      }
      
      const friend = await getUserByUid(friendUid);
      if (!friend) {
        window.location.href = 'chat.html';
        return;
      }
      
      friendName = friend.name;
      friendAvatar = friend.avatar;
      
      document.getElementById('friend-avatar').src = friendAvatar;
      document.getElementById('friend-name').textContent = friendName;
      
      await renderMessages();
      
      const chatInput = document.getElementById('chat-input');
      const sendBtn = document.getElementById('send-btn');
      const backBtn = document.getElementById('back-btn');
      
      backBtn.addEventListener('click', () => {
        window.location.href = 'chat.html';
      });
      
      async function sendMessageFunc() {
        const content = chatInput.value.trim();
        
        if (!content) return;
        
        if (isMuted(user)) {
          showToast('您当前处于禁言状态', 'warning');
          return;
        }
        
        const result = await sendMessage(friendUid, content);
        
        if (result.success) {
          chatInput.value = '';
          await renderMessages();
        } else {
          showToast(result.message, 'error');
        }
      }
      
      sendBtn.addEventListener('click', sendMessageFunc);
      
      chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          sendMessageFunc();
        }
      });
    });
    
    async function renderMessages() {
      const user = await getCurrentUser();
      const messages = await getMessages(friendUid);
      const chatMessages = document.getElementById('chat-messages');
      
      chatMessages.innerHTML = messages.map(m => {
        const isSent = m.sender_uid === user.uid;
        return `
          <div class="message ${isSent ? 'sent' : 'received'}">
            ${m.content}
            <div class="message-time">${formatDate(m.created_at)}</div>
          </div>
        `;
      }).join('');
      
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }
  </script>
</body>
</html>
