<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园论坛 - 搜索</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="search-page">
  <header class="simple-header">
    <button class="back-button" id="backButton">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
      </svg>
      <span>返回</span>
    </button>
    <div class="search-bar-inline">
      <input type="text" id="searchInput" class="search-input" placeholder="搜索..." />
      <button class="search-button" id="searchButton">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>
    <div class="header-actions"></div>
  </header>

  <main class="search-content">
    <div class="search-filters">
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="posts">帖子</button>
      <button class="filter-btn" data-filter="users">用户</button>
      <button class="filter-btn" data-filter="comments">评论</button>
    </div>

    <div class="search-results" id="searchResults">
      <div class="search-loading" id="searchLoading">
        <svg class="loading-spinner" viewBox="25 25 50 50">
          <circle cx="50" cy="50" r="20" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-dasharray="100"/>
        </svg>
        <span>搜索中...</span>
      </div>
      <div class="results-list" id="resultsList"></div>
      <div class="no-results" id="noResults" style="display: none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <p>未找到相关内容</p>
      </div>
    </div>

    <div class="pagination" id="pagination"></div>
  </main>

  <div class="snackbar-container" id="snackbarContainer">
    <div class="md3-snackbar" id="snackbar">
      <div class="md3-snackbar-surface">
        <div class="md3-snackbar-row">
          <svg class="md3-snackbar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span class="md3-snackbar-label" id="snackbarLabel"></span>
        </div>
        <button class="md3-snackbar-action" id="snackbarAction" type="button">
          <span class="md3-snackbar-action-label">关闭</span>
        </button>
      </div>
    </div>
  </div>

  <script src="../assets/js/supabase.js"></script>
  <script type="module" src="../js/search.js"></script>
</body>
</html>
