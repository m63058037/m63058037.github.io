<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园论坛 - 注册</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="register-page">
  <div class="register-container">
    <div class="register-card">
      <div class="register-header">
        <div class="logo-wrapper">
          <svg class="logo" viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="20" fill="url(#logoGradient)"/>
            <path d="M16 20h4v8h-4v-8zm8 0h4v8h-4v-8zm8 0h4v8h-4v-8zM14 34h20v-2H14v2z" fill="white"/>
            <defs>
              <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#673ab7"/>
                <stop offset="100%" style="stop-color:#3f51b5"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1 class="register-title">校园论坛</h1>
        <p class="register-subtitle">创建账号，开始你的校园之旅</p>
      </div>

      <form class="register-form" id="registerForm" novalidate>
        <div class="form-field">
          <label class="form-label" for="uid">用户UID</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
            </svg>
            <input 
              type="text" 
              id="uid" 
              class="form-input" 
              placeholder="请输入8位用户UID" 
              required
              autocomplete="username"
            />
            <span class="input-validation-icon"></span>
          </div>
          <span class="form-error" id="uidError"></span>
        </div>

        <div class="form-field">
          <label class="form-label" for="password">密码</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
              <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
            </svg>
            <input 
              type="password" 
              id="password" 
              class="form-input" 
              placeholder="请输入密码" 
              required
              autocomplete="new-password"
            />
            <button type="button" class="password-toggle" id="passwordToggle" aria-label="切换密码可见性">
              <svg class="toggle-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
              </svg>
            </button>
            <span class="input-validation-icon"></span>
          </div>
          <div class="password-strength" id="passwordStrength">
            <div class="strength-bar">
              <div class="strength-segment" id="strength1"></div>
              <div class="strength-segment" id="strength2"></div>
              <div class="strength-segment" id="strength3"></div>
              <div class="strength-segment" id="strength4"></div>
            </div>
            <span class="strength-text" id="strengthText"></span>
          </div>
          <span class="form-error" id="passwordError"></span>
        </div>

        <div class="form-field">
          <label class="form-label" for="confirmPassword">确认密码</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
              <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
            </svg>
            <input 
              type="password" 
              id="confirmPassword" 
              class="form-input" 
              placeholder="请再次输入密码" 
              required
              autocomplete="new-password"
            />
            <button type="button" class="password-toggle" id="confirmPasswordToggle" aria-label="切换密码可见性">
              <svg class="toggle-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
              </svg>
            </button>
            <span class="input-validation-icon"></span>
          </div>
          <span class="form-error" id="confirmPasswordError"></span>
        </div>

        <div class="form-field">
          <label class="form-label" for="nickname">昵称</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
            <input 
              type="text" 
              id="nickname" 
              class="form-input" 
              placeholder="请输入昵称（可选）" 
              autocomplete="nickname"
            />
            <span class="input-validation-icon"></span>
          </div>
          <span class="form-error" id="nicknameError"></span>
        </div>

        <label class="checkbox-wrapper terms-checkbox">
          <input type="checkbox" id="agreeTerms" class="checkbox-input" required>
          <span class="checkbox-custom"></span>
          <span class="checkbox-label">
            我已阅读并同意
            <a href="#" class="link-primary">用户协议</a>
            和
            <a href="#" class="link-primary">隐私政策</a>
          </span>
        </label>
        <span class="form-error terms-error" id="termsError"></span>

        <button type="submit" class="register-button" id="registerButton">
          <span class="button-text">注册</span>
          <div class="button-loader" id="buttonLoader">
            <svg viewBox="25 25 50 50">
              <circle cx="50" cy="50" r="20" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-dasharray="100" class="loader-spinner"/>
            </svg>
          </div>
        </button>
      </form>

      <div class="register-footer">
        <p class="login-link">
          已有账号？
          <a href="login.html" class="link-primary">立即登录</a>
        </p>
      </div>

      <div class="snackbar-container" id="snackbarContainer">
        <div class="md3-snackbar" id="snackbar">
          <div class="md3-snackbar-surface">
            <div class="md3-snackbar-row">
              <svg class="md3-snackbar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
              <span class="md3-snackbar-label" id="snackbarLabel"></span>
            </div>
            <button class="md3-snackbar-action" id="snackbarAction" type="button">
              <span class="md3-snackbar-action-label">关闭</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="register-decoration">
      <div class="decoration-circle circle-1"></div>
      <div class="decoration-circle circle-2"></div>
      <div class="decoration-circle circle-3"></div>
    </div>
  </div>

  <script src="../assets/js/supabase.js"></script>
  <script type="module" src="../js/register.js"></script>
</body>
</html>
