<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园论坛 - 帖子详情</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="post-detail-page">
  <header class="simple-header">
    <button class="back-button" id="backButton">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
      </svg>
      <span>返回</span>
    </button>
    <h1 class="page-title">帖子详情</h1>
    <div class="header-actions">
      <button class="more-button" id="moreButton" aria-label="更多操作">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="post-detail-content">
    <div class="post-detail-loading" id="postDetailLoading">
      <svg class="loading-spinner" viewBox="25 25 50 50">
        <circle cx="50" cy="50" r="20" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-dasharray="100"/>
      </svg>
      <span>加载中...</span>
    </div>

    <article class="post-detail-card" id="postDetailCard" style="display: none;">
      <div class="post-detail-header">
        <div class="post-detail-author">
          <img id="detailAuthorAvatar" src="" alt="作者头像" class="author-avatar" />
          <div class="author-info">
            <span class="author-name" id="detailAuthorName"></span>
            <span class="post-detail-time" id="detailPostTime"></span>
          </div>
        </div>
        <div class="post-detail-badges" id="detailBadges"></div>
      </div>

      <h1 class="post-detail-title" id="detailTitle"></h1>

      <div class="post-detail-meta">
        <span class="post-detail-category" id="detailCategory"></span>
        <div class="post-detail-tags" id="detailTags"></div>
      </div>

      <div class="post-detail-body" id="detailBody"></div>

      <div class="post-detail-images" id="detailImages"></div>

      <div class="post-detail-stats">
        <span class="stat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <span id="detailViews">0</span>
        </span>
        <span class="stat like-stat" id="detailLikeBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
          </svg>
          <span id="detailLikes">0</span>
        </span>
        <span class="stat favorite-stat" id="detailFavoriteBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
          </svg>
          <span id="detailFavorites">0</span>
        </span>
      </div>

      <div class="post-detail-actions">
        <button class="action-btn" id="editBtn" style="display: none;">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
          </svg>
          <span>编辑</span>
        </button>
        <button class="action-btn" id="deleteBtn" style="display: none;">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
          </svg>
          <span>删除</span>
        </button>
        <button class="action-btn" id="reportBtn">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
          </svg>
          <span>举报</span>
        </button>
      </div>
    </article>

    <div class="comments-section">
      <h3 class="section-title">评论</h3>
      <div class="comments-list" id="commentsList"></div>
      <div class="comment-input-area">
        <textarea id="commentInput" class="comment-input" placeholder="写下你的评论..."></textarea>
        <button class="comment-submit-btn" id="commentSubmitBtn">发送</button>
      </div>
    </div>
  </main>

  <div class="snackbar-container" id="snackbarContainer">
    <div class="md3-snackbar" id="snackbar">
      <div class="md3-snackbar-surface">
        <div class="md3-snackbar-row">
          <svg class="md3-snackbar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span class="md3-snackbar-label" id="snackbarLabel"></span>
        </div>
        <button class="md3-snackbar-action" id="snackbarAction" type="button">
          <span class="md3-snackbar-action-label">关闭</span>
        </button>
      </div>
    </div>
  </div>

  <script src="../assets/js/supabase.js"></script>
  <script type="module" src="../js/post-detail.js"></script>
</body>
</html>
