<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园论坛 - 发帖</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="post-page">
  <header class="simple-header">
    <button class="back-button" id="backButton">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
      </svg>
      <span>返回</span>
    </button>
    <h1 class="page-title">发帖</h1>
    <div class="header-actions">
      <button class="submit-button" id="submitButton">发布</button>
    </div>
  </header>

  <main class="post-content">
    <form class="post-form" id="postForm" novalidate>
      <div class="form-section">
        <label class="form-label" for="title">标题</label>
        <input 
          type="text" 
          id="title" 
          class="form-input title-input" 
          placeholder="请输入帖子标题" 
          required
          maxlength="200"
        />
        <span class="input-counter" id="titleCounter">0/200</span>
        <span class="form-error" id="titleError"></span>
      </div>

      <div class="form-section">
        <label class="form-label" for="content">内容</label>
        <textarea 
          id="content" 
          class="form-textarea post-content-textarea" 
          placeholder="请输入帖子内容..." 
          required
        ></textarea>
        <span class="input-counter" id="contentCounter">0</span>
        <span class="form-error" id="contentError"></span>
      </div>

      <div class="form-section">
        <label class="form-label">图片上传</label>
        <div class="image-upload-area" id="imageUploadArea">
          <div class="upload-button" id="uploadButton">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
            </svg>
            <span>点击上传图片（最多9张）</span>
          </div>
          <input type="file" id="imageFileInput" class="image-file-input" accept="image/*" multiple />
        </div>
        <div class="image-preview-grid" id="imagePreviewGrid"></div>
        <span class="form-error" id="imageError"></span>
      </div>

      <div class="form-section">
        <label class="form-label" for="tags">标签</label>
        <input 
          type="text" 
          id="tags" 
          class="form-input" 
          placeholder="输入标签，用逗号分隔" 
        />
        <p class="form-hint">标签可以帮助其他用户更好地找到您的帖子</p>
      </div>
    </form>
  </main>

  <div class="snackbar-container" id="snackbarContainer">
    <div class="md3-snackbar" id="snackbar">
      <div class="md3-snackbar-surface">
        <div class="md3-snackbar-row">
          <svg class="md3-snackbar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span class="md3-snackbar-label" id="snackbarLabel"></span>
        </div>
        <button class="md3-snackbar-action" id="snackbarAction" type="button">
          <span class="md3-snackbar-action-label">关闭</span>
        </button>
      </div>
    </div>
  </div>

  <script src="../assets/js/supabase.js"></script>
  <script type="module" src="../js/post.js"></script>
</body>
</html>
