<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>快乐论坛 - 忘记密码</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="forgot-password-container">
    <div class="card forgot-password-card">
      <h1>忘记密码</h1>
      <p>请输入您的UID，我们将向管理员提交密码重置申请。</p>
      
      <form id="forgot-form">
        <div class="form-group">
          <label for="uid">UID</label>
          <input type="text" id="uid" class="form-control" placeholder="请输入8位UID" maxlength="8" required>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">提交申请</button>
        
        <p class="text-center text-muted mt-md">
          <a href="#" id="check-status-link">查看申请状态</a>
        </p>
        
        <p class="text-center text-muted mt-sm">
          <a href="index.html">返回登录</a>
        </p>
      </form>
      
      <div id="status-section" style="display: none;">
        <h2 class="text-center mt-lg">申请状态</h2>
        <div id="status-message" class="text-center mt-md"></div>
        <p class="text-center text-muted mt-md">
          <a href="#" id="back-link">返回</a>
        </p>
      </div>
      
      <div id="reset-section" style="display: none;">
        <h2 class="text-center mt-lg">管理员已同意</h2>
        <p class="text-center text-muted">请设置新密码</p>
        
        <form id="reset-form">
          <div class="form-group">
            <label for="new-password">新密码</label>
            <input type="password" id="new-password" class="form-control" placeholder="请输入新密码（至少6位）" required>
          </div>
          
          <div class="form-group">
            <label for="confirm-password">确认密码</label>
            <input type="password" id="confirm-password" class="form-control" placeholder="请再次输入密码" required>
          </div>
          
          <button type="submit" class="btn btn-success" style="width: 100%;">重置密码</button>
        </form>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const forgotForm = document.getElementById('forgot-form');
      const resetForm = document.getElementById('reset-form');
      const uidInput = document.getElementById('uid');
      const resetSection = document.getElementById('reset-section');
      const statusSection = document.getElementById('status-section');
      const statusMessage = document.getElementById('status-message');
      const checkStatusLink = document.getElementById('check-status-link');
      const backLink = document.getElementById('back-link');
      const resetUid = localStorage.getItem('forum_reset_uid');
      
      uidInput.addEventListener('input', (e) => {
        e.target.value = e.target.value.replace(/\D/g, '');
      });
      
      if (resetUid) {
        forgotForm.style.display = 'none';
        resetSection.style.display = 'block';
      }
      
      checkStatusLink.addEventListener('click', async (e) => {
        e.preventDefault();
        const uid = document.getElementById('uid').value;
        
        if (!/^\d{8}$/.test(uid)) {
          showToast('请输入有效的8位UID', 'error');
          return;
        }
        
        const result = await apiRequest('getPasswordRequests');
        const requests = result.success ? result.data : [];
        const userRequest = requests.filter(r => r.uid === uid).sort((a, b) => b.created_at - a.created_at)[0];
        
        if (!userRequest) {
          showToast('没有找到该UID的申请记录', 'warning');
          return;
        }
        
        forgotForm.style.display = 'none';
        statusSection.style.display = 'block';
        
        let statusText = '';
        let statusClass = '';
        
        switch (userRequest.status) {
          case 'pending':
            statusText = '⏳ 申请处理中，请等待管理员审核';
            statusClass = 'text-warning';
            break;
          case 'approved':
            statusText = '✅ 管理员已同意，请设置新密码';
            statusClass = 'text-success';
            localStorage.setItem('forum_reset_uid', uid);
            setTimeout(() => {
              statusSection.style.display = 'none';
              resetSection.style.display = 'block';
            }, 1500);
            break;
          case 'ignored':
            statusText = '❌ 申请已被管理员忽略，密码重置失败';
            statusClass = 'text-danger';
            break;
        }
        
        statusMessage.innerHTML = `<p class="${statusClass}" style="font-size: 1.1rem;">${statusText}</p>`;
      });
      
      backLink.addEventListener('click', (e) => {
        e.preventDefault();
        statusSection.style.display = 'none';
        forgotForm.style.display = 'block';
      });
      
      forgotForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const uid = document.getElementById('uid').value;
        
        if (!/^\d{8}$/.test(uid)) {
          showToast('UID必须是8位数字', 'error');
          return;
        }
        
        const result = await sendPasswordRequest(uid);
        
        if (result.success) {
          showToast('申请已提交，请等待管理员处理', 'success');
        } else {
          showToast(result.message, 'error');
        }
      });
      
      resetForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const newPassword = document.getElementById('new-password').value;
        const confirmPassword = document.getElementById('confirm-password').value;
        
        if (newPassword !== confirmPassword) {
          showToast('两次输入的密码不一致', 'error');
          return;
        }
        
        const result = await apiRequest('changePassword', { uid: resetUid, newPassword });
        
        if (result.success) {
          showToast('密码重置成功，即将返回登录', 'success');
          localStorage.removeItem('forum_reset_uid');
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1500);
        } else {
          showToast(result.message, 'error');
        }
      });
    });
  </script>
</body>
</html>
