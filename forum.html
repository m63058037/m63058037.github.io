<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>快乐论坛 - 论坛</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="container">
      <button class="menu-btn" id="menu-btn">☰</button>
      <div class="logo">快乐论坛</div>
      <div></div>
    </div>
  </header>

  <div class="overlay" id="overlay"></div>
  
  <div class="sidebar" id="sidebar">
    <button class="sidebar-close" id="sidebar-close">×</button>
    <ul class="sidebar-nav">
      <li><a href="forum.html" class="active">论坛</a></li>
      <li><a href="chat.html">私聊</a></li>
      <li><a href="account.html">账户管理</a></li>
      <li><a href="admin.html" id="admin-link">管理员管理</a></li>
      <li><a href="index.html" id="logout-btn">退出登录</a></li>
    </ul>
  </div>

  <main class="container forum-container">
    <button class="btn btn-primary create-post-btn" id="create-post-btn">发布新帖</button>
    
    <div class="post-list" id="post-list">
    </div>
  </main>

  <div class="modal" id="post-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>发布新帖</h2>
        <button class="modal-close" id="modal-close">×</button>
      </div>
      <form id="post-form">
        <div class="form-group">
          <label for="post-content">内容</label>
          <textarea id="post-content" class="form-control" rows="5" placeholder="分享你的想法..." required></textarea>
        </div>
        <div class="form-group">
          <label for="post-image">图片（可选）</label>
          <input type="file" id="post-image" class="form-control" accept="image/*">
        </div>
        <button type="submit" class="btn btn-primary">发布</button>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = await getCurrentUser();
      
      if (!user) {
        window.location.href = 'index.html';
        return;
      }
      
      const adminLink = document.getElementById('admin-link');
      if (!user.is_admin) {
        adminLink.style.display = 'none';
      }
      
      await renderPosts();
      
      const createPostBtn = document.getElementById('create-post-btn');
      const modal = document.getElementById('post-modal');
      const modalClose = document.getElementById('modal-close');
      const postForm = document.getElementById('post-form');
      
      createPostBtn.addEventListener('click', () => {
        if (isMuted(user)) {
          showToast('您当前处于禁言状态', 'warning');
          return;
        }
        modal.classList.add('open');
      });
      
      modalClose.addEventListener('click', () => {
        modal.classList.remove('open');
      });
      
      modal.addEventListener('click', (e) => {
        if (e.target === modal) {
          modal.classList.remove('open');
        }
      });
      
      postForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const content = document.getElementById('post-content').value;
        const imageInput = document.getElementById('post-image');
        
        let imageData = null;
        if (imageInput.files && imageInput.files[0]) {
          try {
            imageData = await readFileAsDataURL(imageInput.files[0]);
          } catch (error) {
            showToast('图片上传失败', 'error');
            return;
          }
        }
        
        const result = await createPost(content, imageData);
        
        if (result.success) {
          showToast('发布成功', 'success');
          modal.classList.remove('open');
          postForm.reset();
          await renderPosts();
        } else {
          showToast(result.message, 'error');
        }
      });
    });
    
    function readFileAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => resolve(e.target.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }
    
    async function renderPosts() {
      const postList = document.getElementById('post-list');
      const posts = await getPosts();
      
      if (posts.length === 0) {
        postList.innerHTML = '<p class="text-center text-muted">暂无帖子，快来发布第一篇吧！</p>';
        return;
      }
      
      postList.innerHTML = posts.map(post => {
        const authorName = post.author_name || '未知用户';
        const authorAvatar = post.author_avatar || AVATARS[0];
        
        return `
          <div class="post-card">
            <div class="post-header">
              <img src="${authorAvatar}" alt="${authorName}" class="post-author-avatar">
              <div class="post-author-info">
                <div class="post-author-name">${authorName}</div>
                <div class="post-time">${formatDate(post.created_at)}</div>
              </div>
            </div>
            <div class="post-content">${post.content}</div>
            ${post.image ? `<img src="${post.image}" class="post-image">` : ''}
          </div>
        `;
      }).join('');
    }
  </script>
</body>
</html>
