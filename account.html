<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>快乐论坛 - 账户管理</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="container">
      <button class="menu-btn" id="menu-btn">☰</button>
      <div class="logo">快乐论坛</div>
      <div></div>
    </div>
  </header>

  <div class="overlay" id="overlay"></div>
  
  <div class="sidebar" id="sidebar">
    <button class="sidebar-close" id="sidebar-close">×</button>
    <ul class="sidebar-nav">
      <li><a href="forum.html">论坛</a></li>
      <li><a href="chat.html">私聊</a></li>
      <li><a href="account.html" class="active">账户管理</a></li>
      <li><a href="admin.html" id="admin-link">管理员管理</a></li>
      <li><a href="index.html" id="logout-btn">退出登录</a></li>
    </ul>
  </div>

  <main class="container account-container">
    <div class="card account-card">
      <div class="account-profile">
        <img src="" alt="Avatar" class="account-avatar" id="account-avatar">
        <div class="account-name" id="account-name"></div>
        <button class="btn btn-outline" id="edit-profile-btn">编辑资料</button>
      </div>
      
      <div class="account-info-grid">
        <div class="info-item">
          <div class="info-label">UID</div>
          <div class="info-value" id="account-uid"></div>
        </div>
        <div class="info-item">
          <div class="info-label">好友数量</div>
          <div class="info-value" id="account-friends"></div>
        </div>
        <div class="info-item">
          <div class="info-label">注册时间</div>
          <div class="info-value" id="account-created"></div>
        </div>
        <div class="info-item">
          <div class="info-label">用户状态</div>
          <div class="info-value" id="account-status"></div>
        </div>
      </div>
      
      <div class="account-actions">
        <button class="btn btn-outline" id="change-password-btn">修改密码</button>
        <button class="btn btn-danger" id="delete-account-btn">删除账户</button>
      </div>
    </div>
  </main>

  <div class="modal" id="edit-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>编辑资料</h2>
        <button class="modal-close" id="edit-modal-close">×</button>
      </div>
      <form id="edit-form">
        <div class="form-group">
          <label for="edit-name">用户名</label>
          <input type="text" id="edit-name" class="form-control" required>
        </div>
        <div class="form-group">
          <label for="edit-avatar">选择头像</label>
          <div class="avatar-selector" id="edit-avatar-selector">
          </div>
        </div>
        <button type="submit" class="btn btn-primary">保存</button>
      </form>
    </div>
  </div>

  <div class="modal" id="password-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>修改密码</h2>
        <button class="modal-close" id="password-modal-close">×</button>
      </div>
      <form id="password-form">
        <div class="form-group">
          <label for="old-password">旧密码</label>
          <input type="password" id="old-password" class="form-control" required>
        </div>
        <div class="form-group">
          <label for="new-password">新密码</label>
          <input type="password" id="new-password" class="form-control" required>
        </div>
        <div class="form-group">
          <label for="confirm-password">确认密码</label>
          <input type="password" id="confirm-password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">修改</button>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const user = getCurrentUser();
      
      if (!user) {
        window.location.href = 'index.html';
        return;
      }
      
      const adminLink = document.getElementById('admin-link');
      if (!user.isAdmin) {
        adminLink.style.display = 'none';
      }
      
      renderAccount(user);
      
      const editProfileBtn = document.getElementById('edit-profile-btn');
      const editModal = document.getElementById('edit-modal');
      const editModalClose = document.getElementById('edit-modal-close');
      const editForm = document.getElementById('edit-form');
      const editAvatarSelector = document.getElementById('edit-avatar-selector');
      
      let selectedAvatar = user.avatar;
      
      AVATARS.forEach((avatar, index) => {
        const option = document.createElement('div');
        option.className = `avatar-option ${avatar === user.avatar ? 'selected' : ''}`;
        option.dataset.avatar = avatar;
        
        const img = document.createElement('img');
        img.src = avatar;
        img.alt = `头像 ${index + 1}`;
        
        option.appendChild(img);
        
        option.addEventListener('click', () => {
          document.querySelectorAll('#edit-avatar-selector .avatar-option').forEach(opt => opt.classList.remove('selected'));
          option.classList.add('selected');
          selectedAvatar = avatar;
        });
        
        editAvatarSelector.appendChild(option);
      });
      
      editProfileBtn.addEventListener('click', () => {
        document.getElementById('edit-name').value = user.name;
        editModal.classList.add('open');
      });
      
      editModalClose.addEventListener('click', () => {
        editModal.classList.remove('open');
      });
      
      editModal.addEventListener('click', (e) => {
        if (e.target === editModal) {
          editModal.classList.remove('open');
        }
      });
      
      editForm.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const name = document.getElementById('edit-name').value;
        
        const result = updateUserProfile(user.uid, name, selectedAvatar);
        
        if (result.success) {
          showToast('资料更新成功', 'success');
          editModal.classList.remove('open');
          renderAccount(getCurrentUser());
        } else {
          showToast(result.message, 'error');
        }
      });
      
      const changePasswordBtn = document.getElementById('change-password-btn');
      const passwordModal = document.getElementById('password-modal');
      const passwordModalClose = document.getElementById('password-modal-close');
      const passwordForm = document.getElementById('password-form');
      
      changePasswordBtn.addEventListener('click', () => {
        passwordModal.classList.add('open');
      });
      
      passwordModalClose.addEventListener('click', () => {
        passwordModal.classList.remove('open');
      });
      
      passwordModal.addEventListener('click', (e) => {
        if (e.target === passwordModal) {
          passwordModal.classList.remove('open');
        }
      });
      
      passwordForm.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const oldPassword = document.getElementById('old-password').value;
        const newPassword = document.getElementById('new-password').value;
        const confirmPassword = document.getElementById('confirm-password').value;
        
        if (newPassword !== confirmPassword) {
          showToast('两次输入的密码不一致', 'error');
          return;
        }
        
        if (hashPassword(oldPassword) !== user.password) {
          showToast('旧密码错误', 'error');
          return;
        }
        
        const result = changePassword(user.uid, newPassword);
        
        if (result.success) {
          showToast('密码修改成功', 'success');
          passwordModal.classList.remove('open');
          passwordForm.reset();
        } else {
          showToast(result.message, 'error');
        }
      });
    });
    
    function renderAccount(user) {
      document.getElementById('account-avatar').src = user.avatar;
      document.getElementById('account-name').textContent = user.name;
      document.getElementById('account-uid').textContent = user.uid;
      
      const friends = getFriends(user.uid);
      document.getElementById('account-friends').textContent = friends.length;
      
      const createdAt = new Date(user.createdAt);
      document.getElementById('account-created').textContent = createdAt.toLocaleDateString('zh-CN');
      
      let status = '正常';
      let statusClass = 'text-success';
      
      if (user.isBanned) {
        status = '已封禁';
        statusClass = 'text-danger';
      } else if (isMuted(user.uid)) {
        status = '禁言中';
        statusClass = 'text-warning';
      }
      
      document.getElementById('account-status').textContent = status;
      document.getElementById('account-status').className = `info-value ${statusClass}`;
    }
  </script>
</body>
</html>
