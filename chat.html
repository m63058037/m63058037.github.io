<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>快乐论坛 - 私聊</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="container">
      <button class="menu-btn" id="menu-btn">☰</button>
      <div class="logo">快乐论坛</div>
      <div></div>
    </div>
  </header>

  <div class="overlay" id="overlay"></div>
  
  <div class="sidebar" id="sidebar">
    <button class="sidebar-close" id="sidebar-close">×</button>
    <ul class="sidebar-nav">
      <li><a href="forum.html">论坛</a></li>
      <li><a href="chat.html" class="active">私聊</a></li>
      <li><a href="account.html">账户管理</a></li>
      <li><a href="admin.html" id="admin-link">管理员管理</a></li>
      <li><a href="index.html" id="logout-btn">退出登录</a></li>
    </ul>
  </div>

  <main class="container chat-container">
    <div class="chat-layout">
      <div class="chat-sidebar">
        <div class="chat-search">
          <input type="text" id="search-input" class="form-control" placeholder="搜索用户...">
        </div>
        
        <div id="search-results" class="search-results"></div>
        
        <div class="chat-friends-list" id="friends-list">
        </div>
      </div>
      
      <div class="chat-main" id="chat-main">
        <div class="chat-header" id="chat-header">
          <span>选择好友开始聊天</span>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-area" id="chat-input-area" style="display: none;">
          <input type="text" id="chat-input" class="form-control chat-input" placeholder="输入消息...">
          <button class="btn btn-primary" id="send-btn">发送</button>
        </div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const user = getCurrentUser();
      
      if (!user) {
        window.location.href = 'index.html';
        return;
      }
      
      const adminLink = document.getElementById('admin-link');
      if (!user.isAdmin) {
        adminLink.style.display = 'none';
      }
      
      renderFriends();
      
      const searchInput = document.getElementById('search-input');
      const searchResults = document.getElementById('search-results');
      
      searchInput.addEventListener('input', (e) => {
        const query = e.target.value.trim();
        
        if (!query) {
          searchResults.innerHTML = '';
          renderFriends();
          return;
        }
        
        const users = searchUsers(query);
        
        if (users.length === 0) {
          searchResults.innerHTML = '<p class="text-muted text-center">没有找到用户</p>';
        } else {
          searchResults.innerHTML = users.map(u => `
            <div class="search-user">
              <img src="${u.avatar}" alt="${u.name}" class="friend-avatar">
              <span class="friend-name">${u.name} (${u.uid})</span>
              <button class="btn btn-sm btn-primary add-friend-btn" data-uid="${u.uid}">添加好友</button>
            </div>
          `).join('');
          
          document.querySelectorAll('.add-friend-btn').forEach(btn => {
            btn.addEventListener('click', () => {
              const friendUid = btn.dataset.uid;
              const result = sendFriendRequest(user.uid, friendUid);
              
              if (result.success) {
                showToast('好友请求已发送', 'success');
                searchInput.value = '';
                searchResults.innerHTML = '';
                renderFriends();
              } else {
                showToast(result.message, 'error');
              }
            });
          });
        }
      });
    });
    
    let currentFriend = null;
    
    function renderFriends() {
      const user = getCurrentUser();
      const friendsList = document.getElementById('friends-list');
      const friends = getFriends(user.uid);
      const requests = getFriendRequests(user.uid);
      
      let html = '';
      
      if (requests.length > 0) {
        html += `<h4 style="padding: 8px; margin-bottom: 8px; font-size: 0.875rem; color: var(--secondary);">好友请求 (${requests.length})</h4>`;
        html += requests.map(r => `
          <div class="friend-item">
            <img src="${r.requester.avatar}" alt="${r.requester.name}" class="friend-avatar">
            <span class="friend-name">${r.requester.name}</span>
            <div>
              <button class="btn btn-sm btn-success accept-btn" data-id="${r.id}">接受</button>
            </div>
          </div>
        `).join('');
      }
      
      if (friends.length > 0) {
        html += `<h4 style="padding: 8px; margin-bottom: 8px; font-size: 0.875rem; color: var(--secondary);">好友 (${friends.length})</h4>`;
        html += friends.map(f => `
          <div class="friend-item ${currentFriend?.uid === f.uid ? 'active' : ''}" data-uid="${f.uid}">
            <img src="${f.avatar}" alt="${f.name}" class="friend-avatar">
            <span class="friend-name">${f.name}</span>
            <span class="friend-status online"></span>
          </div>
        `).join('');
      } else {
        html += '<p class="text-muted text-center">暂无好友，搜索用户添加好友吧</p>';
      }
      
      friendsList.innerHTML = html;
      
      document.querySelectorAll('.accept-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const result = acceptFriendRequest(btn.dataset.id);
          if (result.success) {
            showToast('已接受好友请求', 'success');
            renderFriends();
          }
        });
      });
      
      document.querySelectorAll('.friend-item[data-uid]').forEach(item => {
        item.addEventListener('click', () => {
          const friendUid = item.dataset.uid;
          const friend = getUserByUid(friendUid);
          
          if (!friend) return;
          
          currentFriend = friend;
          renderChat(friend);
          renderFriends();
        });
      });
    }
    
    function renderChat(friend) {
      const user = getCurrentUser();
      const chatHeader = document.getElementById('chat-header');
      const chatMessages = document.getElementById('chat-messages');
      const chatInputArea = document.getElementById('chat-input-area');
      
      chatHeader.innerHTML = `
        <img src="${friend.avatar}" alt="${friend.name}" class="friend-avatar">
        <span>${friend.name}</span>
      `;
      
      const messages = getMessages(user.uid, friend.uid);
      
      chatMessages.innerHTML = messages.map(m => {
        const isSent = m.senderUid === user.uid;
        return `
          <div class="message ${isSent ? 'sent' : 'received'}">
            ${m.content}
            <div class="message-time">${formatDate(m.createdAt)}</div>
          </div>
        `;
      }).join('');
      
      chatMessages.scrollTop = chatMessages.scrollHeight;
      chatInputArea.style.display = 'flex';
      
      const chatInput = document.getElementById('chat-input');
      const sendBtn = document.getElementById('send-btn');
      
      function sendMessageFunc() {
        const content = chatInput.value.trim();
        
        if (!content) return;
        
        if (isMuted(user.uid)) {
          showToast('您当前处于禁言状态', 'warning');
          return;
        }
        
        const result = sendMessage(user.uid, friend.uid, content);
        
        if (result.success) {
          chatInput.value = '';
          renderChat(friend);
        } else {
          showToast(result.message, 'error');
        }
      }
      
      sendBtn.onclick = sendMessageFunc;
      
      chatInput.onkeypress = (e) => {
        if (e.key === 'Enter') {
          sendMessageFunc();
        }
      };
    }
  </script>
</body>
</html>
